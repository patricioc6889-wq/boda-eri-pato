  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

'Inter',sans-serif; font-size:12px; font-weight:500; letter-spacing:2.5px; text-transform:uppercase; color:#DDCDB4; background:#590606; border:none; border-radius:2px; padding:14px 34px; cursor:pointer;\">Enviar sugerencia<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showPhotos }}\" hint-placeholder-val=\"{{ true }}\">\n  <!-- COMPARTIR FOTOS -->\n  <section id=\"fotos-invitados\" style=\"padding:78px 24px; text-align:center; border-top:1px solid rgba(207,167,102,.28);\">\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-size:clamp(25px,3.8vw,34px); color:#590606; margin:0 0 4px; font-weight:400; text-transform:uppercase; letter-spacing:4px;\">Compartí tus Fotos<\u002Fh2>\n    <div style=\"display:flex; align-items:center; justify-content:center; gap:14px; margin:6px auto 26px;\">\n      <span style=\"height:1px; width:74px; background:linear-gradient(90deg,transparent,#CFA766);\"><\u002Fspan>\n      <span style=\"color:#CFA766; font-size:17px;\">✦<\u002Fspan>\n      <span style=\"height:1px; width:74px; background:linear-gradient(270deg,transparent,#CFA766);\"><\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-family:'Inter',sans-serif; font-weight:300; font-size:clamp(15px,2.2vw,17px); line-height:1.8; color:#1A1F2E; max-width:520px; margin:0 auto 32px;\">Cada mirada cuenta una historia. Subí las fotos que tomes durante el día a nuestro álbum compartido y ayudanos a revivir cada momento.<\u002Fp>\n    <div style=\"display:flex; flex-direction:column; align-items:center; gap:26px;\">\n      <!-- QR del álbum compartido -->\n      <div style=\"background:#fff; padding:14px; border-radius:10px; border:1px solid rgba(207,167,102,.5); box-shadow:0 8px 24px rgba(89,6,6,.1); line-height:0;\">\n        <img ref=\"{{ refQr }}\" alt=\"QR del álbum compartido\" width=\"160\" height=\"160\" style=\"display:block; width:160px; height:160px; border-radius:4px;\">\n      <\u002Fdiv>\n      <div style=\"font-family:'Inter',sans-serif; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:#8a7550; margin-top:-12px;\">Escaneá para subir tus fotos<\u002Fdiv>\n      <a href=\"{{ driveUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:11px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; letter-spacing:2.5px; text-transform:uppercase; color:#590606; background:transparent; border:1px solid rgba(207,167,102,.7); border-radius:2px; padding:15px 30px; cursor:pointer; text-decoration:none; transition:background .3s ease, color .3s ease;\" style-hover=\"background:#590606; color:#DDCDB4;\">Abrir álbum compartido\n        <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 3h7v7\"><\u002Fpath><path d=\"M10 14 21 3\"><\u002Fpath><path d=\"M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- FAQ -->\n  <section id=\"faq\" style=\"padding:78px 24px; text-align:center; border-top:1px solid rgba(207,167,102,.28);\">\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-size:clamp(25px,3.8vw,34px); color:#590606; margin:0 0 4px; font-weight:400; text-transform:uppercase; letter-spacing:4px;\">Preguntas Frecuentes<\u002Fh2>\n    <div style=\"display:flex; align-items:center; justify-content:center; gap:14px; margin:6px auto 34px;\">\n      <span style=\"height:1px; width:74px; background:linear-gradient(90deg,transparent,#CFA766);\"><\u002Fspan>\n      <span style=\"color:#CFA766; font-size:17px;\">✦<\u002Fspan>\n      <span style=\"height:1px; width:74px; background:linear-gradient(270deg,transparent,#CFA766);\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"max-width:680px; margin:0 auto; text-align:left;\">\n      <sc-for list=\"{{ faqItems }}\" as=\"f\" hint-placeholder-count=\"5\">\n        <div style=\"border-bottom:1px solid rgba(207,167,102,.32);\">\n          <button type=\"button\" onclick=\"{{ f.onClick }}\" style=\"width:100%; display:flex; align-items:center; justify-content:space-between; gap:16px; background:none; border:none; cursor:pointer; padding:21px 4px;\">\n            <span style=\"font-family:'Cormorant Garamond',serif; font-size:clamp(19px,2.6vw,22px); color:#590606; text-align:left;\">{{ f.q }}<\u002Fspan>\n            <span style=\"{{ f.iconStyle }}\">+<\u002Fspan>\n          <\u002Fbutton>\n          <div style=\"{{ f.answerStyle }}\"><p style=\"font-family:'Inter',sans-serif; font-weight:300; font-size:15px; line-height:1.75; color:#1A1F2E; margin:0; padding:0 4px 22px;\">{{ f.a }}<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RSVP -->\n  <section id=\"rsvp\" style=\"padding:78px 24px; text-align:center; border-top:1px solid rgba(207,167,102,.28);\">\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-size:clamp(25px,3.8vw,34px); color:#590606; margin:0 0 4px; font-weight:400; text-transform:uppercase; letter-spacing:4px;\">Confirmar Asistencia<\u002Fh2>\n    <div style=\"display:flex; align-items:center; justify-content:center; gap:14px; margin:6px auto 26px;\">\n      <span style=\"height:1px; width:74px; background:linear-gradient(90deg,transparent,#CFA766);\"><\u002Fspan>\n      <span style=\"color:#CFA766; font-size:17px;\">✦<\u002Fspan>\n      <span style=\"height:1px; width:74px; background:linear-gradient(270deg,transparent,#CFA766);\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; flex-wrap:wrap; gap:44px; max-width:1000px; margin:0 auto; align-items:center; justify-content:center;\">\n      <div style=\"flex:1 1 420px; min-width:300px; max-width:480px;\">\n    <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:480px; margin:0 auto; background:rgba(255,255,255,.5); border:1px solid rgba(207,167,102,.5); border-radius:4px; padding:46px 30px;\">\n        <div style=\"color:#CFA766; font-size:30px; margin-bottom:12px;\">♡<\u002Fdiv>\n        <h3 style=\"font-family:'Cormorant Garamond',serif; font-weight:600; font-size:24px; color:#590606; margin:0 0 10px;\">{{ thanksHeading }}<\u002Fh3>\n        <p style=\"font-family:'Inter',sans-serif; font-weight:300; font-size:15px; line-height:1.7; color:#1A1F2E; margin:0;\">Recibimos tu respuesta. Nos encanta que seas parte de este día tan especial.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n      <form onsubmit=\"{{ submitRsvp }}\" style=\"max-width:480px; margin:0 auto; text-align:left;\">\n        <p style=\"font-family:'Inter',sans-serif; font-weight:300; font-size:15px; line-height:1.7; color:#1A1F2E; text-align:center; margin:0 0 8px;\">Nos encantaría compartir este momento con vos.<\u002Fp>\n        <sc-if value=\"{{ showGuest }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-family:'Cormorant Garamond',serif; font-style:italic; font-size:18px; color:#590606; text-align:center; margin:0 0 28px;\">{{ recipientName }}<\u002Fp><\u002Fsc-if>\n\n        <label style=\"font-family:'Inter',sans-serif; font-size:12px; letter-spacing:2px; color:#590606; text-transform:uppercase; display:block; margin-bottom:10px;\">¿Quién confirma?<\u002Flabel>\n        <input type=\"text\" value=\"{{ titular }}\" oninput=\"{{ onTitular }}\" required=\"\" placeholder=\"Tu nombre y apellido\" style=\"width:100%; box-sizing:border-box; padding:13px 14px; border:1px solid rgba(207,167,102,.6); border-radius:2px; background:rgba(255,255,255,.6); font-family:'Inter',sans-serif; font-size:14px; color:#1A1F2E; outline:none; margin-bottom:8px;\">\n        <p style=\"font-family:'Inter',sans-serif; font-weight:300; font-style:italic; font-size:13px; color:#8a7550; margin:0 0 26px;\">La persona de la familia que responde por el grupo.<\u002Fp>\n\n        <label style=\"font-family:'Inter',sans-serif; font-size:12px; letter-spacing:2px; color:#590606; text-transform:uppercase; display:block; margin-bottom:10px;\">¿Nos acompañás?<\u002Flabel>\n        <div style=\"display:flex; gap:12px; margin-bottom:26px;\">\n          <button type=\"button\" onclick=\"{{ setAsiste }}\" data-v=\"1\" style=\"flex:1; padding:13px; border-radius:2px; cursor:pointer; font-family:'Inter',sans-serif; font-size:14px; border:1px solid #590606; background:#590606; color:#fdf6ea;\">Sí, asistiré<\u002Fbutton>\n          <button type=\"button\" onclick=\"{{ setAsiste }}\" data-v=\"0\" style=\"flex:1; padding:13px; border-radius:2px; cursor:pointer; font-family:'Inter',sans-serif; font-size:14px; border:1px solid rgba(89,6,6,.4); background:transparent; color:#590606;\">No podré<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ asisteNo }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"font-family:'Inter',sans-serif; font-weight:300; font-size:14px; color:#1A1F2E; text-align:center; margin:0 0 24px;\">Te vamos a extrañar. ¡Gracias por avisarnos!<\u002Fp>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ showRest }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <label style=\"font-family:'Inter',sans-serif; font-size:12px; letter-spacing:2px; color:#590606; text-transform:uppercase; display:block; margin-bottom:10px;\">¿Cuántos acompañantes asistirán?<\u002Flabel>\n            <div style=\"display:flex; align-items:center; gap:18px; margin-bottom:24px;\">\n              <button type=\"button\" onclick=\"{{ changeNum }}\" data-d=\"-1\" style=\"width:42px; height:42px; border-radius:50%; border:1px solid rgba(89,6,6,.4); background:transparent; color:#590606; font-size:22px; cursor:pointer; line-height:1;\">−<\u002Fbutton>\n              <span style=\"font-family:'Cormorant Garamond',serif; font-weight:600; font-size:30px; color:#590606; min-width:34px; text-align:center;\">{{ numAcompStr }}<\u002Fspan>\n              <button type=\"button\" onclick=\"{{ changeNum }}\" data-d=\"1\" style=\"width:42px; height:42px; border-radius:50%; border:1px solid rgba(89,6,6,.4); background:transparent; color:#590606; font-size:22px; cursor:pointer; line-height:1;\">+<\u002Fbutton>\n              <span style=\"font-family:'Inter',sans-serif; font-weight:300; font-size:13px; color:#1A1F2E;\">(además de vos)<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-family:'Inter',sans-serif; font-weight:300; font-style:italic; font-size:13px; color:#8a7550; margin:-12px 0 24px;\">No te cuentes a vos: ya quedás registrado como quien confirma.<\u002Fp>\n            <sc-if value=\"{{ showSeatHint }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"font-family:'Inter',sans-serif; font-weight:300; font-size:13px; color:#590606; margin:-12px 0 24px;\">{{ seatHint }}<\u002Fp>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ showNames }}\" hint-placeholder-val=\"{{ false }}\">\n              <div>\n                <label style=\"font-family:'Inter',sans-serif; font-size:12px; letter-spacing:2px; color:#590606; text-transform:uppercase; display:block; margin-bottom:10px;\">Nombres de los acompañantes<\u002Flabel>\n                <div style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:24px;\">\n                  <sc-for list=\"{{ names }}\" as=\"nm\" hint-placeholder-count=\"2\">\n                    <input type=\"text\" value=\"{{ nm }}\" data-i=\"{{ $index }}\" oninput=\"{{ onName }}\" placeholder=\"Nombre y apellido\" style=\"width:100%; padding:13px 14px; border:1px solid rgba(207,167,102,.6); border-radius:2px; background:rgba(255,255,255,.6); font-family:'Inter',sans-serif; font-size:14px; color:#1A1F2E; outline:none;\">\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <label style=\"display:flex; align-items:center; gap:11px; font-family:'Inter',sans-serif; font-size:14px; color:#1A1F2E; margin-bottom:18px; cursor:pointer;\">\n              <input type=\"checkbox\" onchange=\"{{ toggleSpecial }}\" style=\"width:18px; height:18px; accent-color:#590606;\">\n              ¿Algún asistente requiere menú especial?\n            <\u002Flabel>\n\n            <sc-if value=\"{{ showMenuOpts }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-bottom:18px;\">\n                <div style=\"display:flex; gap:12px; flex-wrap:wrap;\">\n                  <label style=\"display:flex; align-items:center; gap:9px; font-family:'Inter',sans-serif; font-size:14px; color:#1A1F2E; padding:11px 16px; border:1px solid rgba(207,167,102,.6); border-radius:2px; background:rgba(255,255,255,.5); cursor:pointer;\"><input type=\"checkbox\" data-opt=\"Vegetariano\" onchange=\"{{ toggleMenuOpt }}\" style=\"width:16px; height:16px; accent-color:#590606;\">Vegetariano<\u002Flabel>\n                  <label style=\"display:flex; align-items:center; gap:9px; font-family:'Inter',sans-serif; font-size:14px; color:#1A1F2E; padding:11px 16px; border:1px solid rgba(207,167,102,.6); border-radius:2px; background:rgba(255,255,255,.5); cursor:pointer;\"><input type=\"checkbox\" data-opt=\"Sin TACC / Celíaco\" onchange=\"{{ toggleMenuOpt }}\" style=\"width:16px; height:16px; accent-color:#590606;\">Sin TACC / Celíaco<\u002Flabel>\n                <\u002Fdiv>\n                <sc-if value=\"{{ showMenuNote }}\" hint-placeholder-val=\"{{ false }}\">\n                  <p style=\"font-family:'Inter',sans-serif; font-weight:300; font-style:italic; font-size:13px; color:#590606; margin:12px 0 0;\">Por favor, indicá en Observaciones quién requiere cada menú.<\u002Fp>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <label style=\"font-family:'Inter',sans-serif; font-size:12px; letter-spacing:2px; color:#590606; text-transform:uppercase ght:52px; border-radius:50%; border:1px solid rgba(207,167,102,.35); background:rgba(207,167,102,.06); color:#CFA766; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:4; transition:background .3s ease, border-color .3s ease;\" style-hover=\"background:rgba(207,167,102,.16); border-color:rgba(207,167,102,.7);\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#CFA766\" stroke-width=\"1.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<audio ref=\"{{ refAudio }}\" loop=\"\" preload=\"none\"><\u002Faudio>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100vh&quot;}}\">\nclass Component extends DCLogic {\n  photos8 = ['Foto 01','Foto 02','Foto 03','Foto 04','Foto 05','Foto 06','Foto 07','Foto 08'];\n  API_BASE = '/api';\n  state = {\n    opened:false, musicOn:false, menuOpen:false, now:Date.now(),\n    pos:0, dragging:false, vw:(typeof window!=='undefined'?window.innerWidth:1000),\n    lbOpen:false, lbIndex:0, lbDrag:0,\n    asiste:null, titular:'', numAcomp:0, names:[], special:false, menuSel:[], obs:'', submitted:false,\n    songTitle:'', songArtist:'', songLink:'', songObs:'', songs:[], songThanks:false, faqOpen:null, aliasCopied:false,\n    giftsOpen:false, showSongForm:false, maxSeats:0,\n    recipientName:'', showCivil:true, showCeremony:true, showReception:false, hasGuest:false, cfgLoaded:false,\n    galleryImages:[],\n    showStory:true, showGallery:true, showGifts:true, showPlaylist:true, showPhotos:true, showDressCode:true,\n    giftAlias:'ERI.PATO.BODA', giftCbu:'0000003100012345678901', giftOwner:'A confirmar', giftBank:'A confirmar'\n  };\n  faqs = [\n    { q:'¿Necesitás modificar tu confirmación?', a:'Si querés actualizar o modificar tu confirmación o la lista de acompañantes, escribinos por WhatsApp a los novios y lo coordinamos.' },\n    { q:'¿Hasta cuándo puedo confirmar asistencia?', a:'Te pedimos que confirmes antes del 01 de octubre de 2026 para poder organizar todo con tiempo. Podés hacerlo desde la sección Confirmar Asistencia.' },\n    { q:'¿A qué hora tengo que llegar?', a:'La ceremonia comienza puntual a las 17:00 hs. Te recomendamos llegar 20 minutos antes para acomodarte y no perderte ningún momento. Seguido de la ceremonia nos vamos al salón.' },\n    { q:'¿Hay estacionamiento en el salón?', a:'Sí, el salón cuenta con estacionamiento propio. También hay lugar amplio sobre la calle.' },\n    { q:'¿Qué regalo les gustaría recibir?', a:'Tu presencia ya es nuestro mejor regalo. Si querés hacernos un obsequio, vas a encontrar los datos para colaborar con nuestra luna de miel en la sección de regalos.' }\n  ];\n\n  componentDidMount(){\n    // Fecha de la boda: ceremonia 10/10/2026 17:00 (ART)\n    this.target = new Date('2026-10-10T17:00:00-03:00').getTime();\n    document.body.style.overflow = 'hidden';      // bloquea scroll hasta abrir el sobre\n    this._t = setInterval(()=>this.setState({ now:Date.now() }), 1000);\n    this._onResize = () => this.setState({ vw:window.innerWidth });\n    window.addEventListener('resize', this._onResize);\n    // re-mide el escenario una vez montado\n    requestAnimationFrame(()=>this.setState({ vw:window.innerWidth }));\n    this.loadConfig();\n  }\n\n  // ---- Carga dinámica de config (WF-04) ----\n  _guestCacheKey(){ return 'ep_guest_'+(this.slug||'eri-pato')+'_'+(this.guestId||''); }\n  loadConfig(){\n    try{\n      const params = new URLSearchParams(location.search);\n      this.slug = params.get('slug') || 'eri-pato';\n      this.guestId = params.get('id') || '';\n    }catch(_){ this.slug='eri-pato'; this.guestId=''; }\n    // Caché del NOMBRE del invitado (nunca cambia): en reaperturas se muestra al instante,\n    // sin esperar a n8n. La config/eventos SIEMPRE se piden en vivo (no se cachean) para no\n    // mostrar nunca datos viejos.\n    if(this.guestId){\n      try{\n        const cached = JSON.parse(localStorage.getItem(this._guestCacheKey())||'null');\n        if(cached && cached.recipientName){\n          this.setState({ recipientName:cached.recipientName, hasGuest:true, cfgLoaded:true });\n        }\n      }catch(_){}\n    }\n    // Sin ?id= no hay nombre que esperar → resolver de inmediato (genérico, sin parpadeo)\n    if(!this.guestId){ this.setState({ cfgLoaded:true }); }\n    if(typeof fetch!=='function'){ this.setState({ cfgLoaded:true }); return; }\n    // Fallback: si n8n no responde a tiempo, resolver igual para no quedar en \"cargando\".\n    // Con ?id= damos mucho más margen para que gane la carga del nombre y NO aparezca\n    // \"Estás invitado\" antes del nombre del invitado (solo se muestra como último recurso).\n    this._cfgTimer = setTimeout(()=>{ if(!this.state.cfgLoaded) this.setState({ cfgLoaded:true }); }, this.guestId ? 15000 : 5000);\n    fetch(this.API_BASE+'/config?slug='+encodeURIComponent(this.slug)+(this.guestId?('&id='+encodeURIComponent(this.guestId)):''))\n      .then(r=> r.ok ? r.json() : null)\n      .then(d=>{ if(d && d.success) this.applyConfig(d); else this.setState({ cfgLoaded:true }); })\n      .catch(()=>{ this.setState({ cfgLoaded:true }); });   // sin red/CORS: queda el contenido por defecto\n  }\n  applyConfig(d){\n    const cfg = d.config || {};\n    const ev = cfg.events || {};\n    const patch = {};\n    const rn = (d.guest && d.guest.recipientName) || (cfg.envelope && cfg.envelope.recipientName);\n    if(rn) patch.recipientName = rn;\n    patch.hasGuest = !!(d.guest && d.guest.recipientName);\n    // Refrescar la caché del nombre con el valor en vivo (por si alguna vez cambió en Sheets)\n    if(d.guest && d.guest.recipientName && this.guestId){\n      try{ localStorage.setItem(this._guestCacheKey(), JSON.stringify({ recipientName:d.guest.recipientName })); }catch(_){}\n    }\n    const ms = d.guest && parseInt(d.guest.maxSeats, 10);\n    patch.maxSeats = (ms && ms>0) ? ms : 0;   // 0 = sin límite\n    patch.cfgLoaded = true;\n    if(this._cfgTimer) clearTimeout(this._cfgTimer);\n    if(ev.civil)     patch.showCivil     = ev.civil.enabled !== false;\n    if(ev.ceremony)  patch.showCeremony  = ev.ceremony.enabled !== false;\n    if(ev.reception) patch.showReception = ev.reception.enabled !== false;\n    if(cfg.gallery && Array.isArray(cfg.gallery.images)) patch.galleryImages = cfg.gallery.images.filter(Boolean);\n    // Visibilidad de secciones según enabled del config\n    if(cfg.story)               patch.showStory     = cfg.story.enabled !== false;\n    if(cfg.gallery)             patch.showGallery   = cfg.gallery.enabled !== false;\n    if(cfg.gifts)               patch.showGifts     = cfg.gifts.enabled !== false;\n    if(cfg.playlistSuggestions) patch.showPlaylist  = cfg.playlistSuggestions.enabled !== false;\n    if(cfg.guestPhotoSharing)   patch.showPhotos    = cfg.guestPhotoSharing.enabled !== false;\n    if(cfg.dressCode)           patch.showDressCode = cfg.dressCode.enabled !== false;\n    // Countdown: recalcular el target desde B2\n    if(cfg.countdown && cfg.countdown.targetDate){ const t=new Date(cfg.countdown.targetDate).getTime(); if(!isNaN(t)) this.target=t; }\n    // Datos de transferencia (gifts) desde B2\n    if(cfg.gifts){\n      if(cfg.gifts.alias)     patch.giftAlias = cfg.gifts.alias;\n      if(cfg.gifts.cbu)       patch.giftCbu   = cfg.gifts.cbu;\n      if(cfg.gifts.bankOwner) patch.giftOwner = cfg.gifts.bankOwner;\n      if(cfg.gifts.bank)      patch.giftBank  = cfg.gifts.bank;\n    }\n    const msrc = (cfg.music && cfg.music.source) || '';\n    // Solo asignar el audio si el archivo existe (evita error 404 si aún no se subió el mp3)\n    if(msrc && this.audioRef && typeof fetch==='function' && /^(\\.?\\/)?[^/]/.test(msrc) && !/our-song\\.mp3$/.test(msrc)){\n      fetch(msrc, { method:'HEAD' }).then(r=>{\n        if(r.ok && this.audioRef){ this.audioRef.src = msrc; if(this.state.opened && this.state.musicOn){ this.audioRef.volume = 0.12; this.audioRef.play().catch(()=>{}); } }\n      }).catch(()=>{});\n    }\n    this.cfg = cfg; this.guest = d.guest || null;\n    this.setState(patch);\n  }\n  componentWillUnmount(){ clearInterval(this._t); document.body.style.overflow=''; window.removeEventListener('resize', this._onResize); }\n\n  tryPlay(){ const a=this.audioRef; if(a && a.getAttribute('src')){ a.volume=0.12; a.play().catch(()=>{}); } }\n\n  openEnvelope = () => {\n    if(this.state.opened || this._opening) return;\n    this._opening = true;\n    const { lacreRef:l, flapRef:f, cardRef:c, ovRef:o } = this;\n    if(l) l.style.animation = 'lacreFall .9s cubic-bezier(.5,0,.75,1) forwards';\n    setTimeout(()=>{ if(f) f.style.animation='flapOpen 1s ease-in-out forwards'; }, 550);\n    setTimeout(()=>{ if(c){ c.style.zIndex='30'; c.style.animation='cardRise 1.15s cubic-bezier(.2,.6,.3,1) forwards'; } }, 1250);\n    setTimeout(()=>{ if(o) o.style.animation='ovFade .9s ease forwards'; document.body.style.overflow='auto'; }, 2850);\n    setTimeout(()=>{ this.setState({ opened:true, musicOn:true }); this.tryPlay(); if(o) o.style.display='none'; }, 3750);\n  };\n\n  toggleMusic = () => {\n    const on = !this.state.musicOn; this.setState({ musicOn:on });\n    const a=this.audioRef; if(a && a.getAttribute('src')){ if(on){ a.volume=0.12; a.play().catch(()=>{}); } else a.pause(); }\n  };\n\n  openMenu = () => this.setState({ menuOpen:true });\n  closeMenu = () => this.setState({ menuOpen:false });\n\n  // ---- Galería coverflow ----\n  _metrics(){\n    const vw = this.state.vw || (typeof window!=='undefined'?window.innerWidth:900);\n    const w = this.stageRef ? this.stageRef.clientWidth : Math.min(vw-32, 1108);\n    const mob = vw <= 680;\n    const cardW = mob ? Math.min(w*0.60, 280) : Math.min(w*0.30, 270);\n    const cardH = Math.min(cardW*1.28, 380);\n    const spacing = mob ? cardW*0.94 : cardW*0.86;\n    const maxSide = mob ? 1 : 2;\n    return { w, mob, cardW, cardH, spacing, maxSide };\n  }\n  bindStage = (el) => {\n    // Enganchar pointer events nativamente (los atributos onPointer* se pierden al empaquetar a HTML)\n    if(this._stageBound === el) return;\n    if(this.stageRef && this._stageBound){\n      this.stageRef.removeEventListener('pointerdown', this.onDragStart);\n      this.stageRef.removeEventListener('pointermove', this.onDragMove);\n      this.stageRef.removeEventListener('pointerup', this.onDragEnd);\n      this.stageRef.removeEventListener('pointerleave', this.onDragEnd);\n      this.stageRef.removeEventListener('pointercancel', this.onDragEnd);\n    }\n    this.stageRef = el; this._stageBound = el;\n    if(el){\n      el.addEventListener('pointerdown', this.onDragStart);\n      el.addEventListener('pointermove', this.onDragMove);\n      el.addEventListener('pointerup', this.onDragEnd);\n      el.addEventListener('pointerleave', this.onDragEnd);\n      el.addEventListener('pointercancel', this.onDragEnd);\n    }\n  };\n  onDragStart = (e) => {\n    this._startX = e.clientX; this._pos0 = this.state.pos; this._moved = false;\n    this.setState({ dragging:true });\n    try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){}\n  };\n  onDragMove = (e) => {\n    if(!this.state.dragging) return;\n    const dx = e.clientX - this._startX;\n    if(Math.abs(dx) > 6) this._moved = true;\n    const step = this._metrics().spacing || 200;\n    const pos = this._pos0 - dx/step;   // sin tope: loop infinito\n    this.setState({ pos });\n  };\n  onDragEnd = () => {\n    if(!this.state.dragging) return;\n    const pos = Math.round(this.state.pos);\n    this.setState({ dragging:false, pos });\n    if(this._moved){ this._suppress = true; setTimeout(()=>{ this._suppress = false; }, 80); }\n  };\n  // ---- Lightbox (galería completa) ----\n  openLbAt = (i) => { if(this._suppress) return; this.setState({ lbOpen:true, lbIndex:i, lbDrag:0 }); };\n  _mod = (i) => { const N=this.photos8.length; return ((i%N)+N)%N; };\n  openLbCurrent = () => this.setState({ lbOpen:true, lbIndex:this._mod(Math.round(this.state.pos)), lbDrag:0 });\n  closeLb = () => this.setState({ lbOpen:false });\n  stopProp = (e) => e.stopPropagation();\n  lbPrev = (e) => { if(e&&e.stopPropagation) e.stopPropagation(); this.setState(s=>({ lbIndex:(s.lbIndex-1+this.photos8.length)%this.photos8.length, lbDrag:0 })); };\n  lbNext = (e) => { if(e&&e.stopPropagation) e.stopPropagation(); this.setState(s=>({ lbIndex:(s.lbIndex+1)%this.photos8.length, lbDrag:0 })); };\n  onLbDown = (e) => { this._lbStart = e.clientX; this._lbActive = true; this.setState({ lbDrag:0 }); try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){} };\n  onLbMove = (e) => { if(!this._lbActive) return; this.setState({ lbDrag: e.clientX - this._lbStart }); };\n  onLbUp = () => { if(!this._lbActive) return; this._lbActive = false; const dx = this.state.lbDrag; if(dx > 50) this.lbPrev(); else if(dx < -50) this.lbNext(); else this.setState({ lbDrag:0 }); };\n\n  // ---- Playlist sugerida ----\n  onSongTitle = (e) => this.setState({ songTitle:e.currentTarget.value, songThanks:false });\n  onSongArtist = (e) => this.setState({ songArtist:e.currentTarget.value, songThanks:false });\n  onSongLink = (e) => this.setState({ songLink:e.currentTarget.value, songThanks:false });\n  onSongObs = (e) => this.setState({ songObs:e.currentTarget.value, songThanks:false });\n  addSong = () => {\n    const t=this.state.songTitle.trim(), a=this.state.songArtist.trim();\n    const link=this.state.songLink.trim(), obs=this.state.songObs.trim();\n    if(!t) return;\n    // idempotente: si ya existe esa canción, no la duplica (cubre cualquier doble-invocación)\n    if(this.state.songs.some(x=>x.title===t && x.artist===a)){\n      this.setState({ songTitle:'', songArtist:'', songLink:'', songObs:'', songThanks:true });\n      return;\n    }\n    // Payload listo para n8n + Google Sheets\n    const sp = { slug:(this.slug||'eri-pato'), guestId:(this.guestId||''), cancion:t, artista:a, link, observacion:obs };\n    try{ fetch(this.API_BASE+'/playlist', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(sp) }).catch(()=>{}); }catch(_){}\n    this.setState({ songs:this.state.songs.concat({ title:t, artist:a, link, obs }), songTitle:'', songArtist:'', songLink:'', songObs:'', songThanks:true });\n  };\n  openGifts = () => this.setState({ giftsOpen:true });\n  closeGifts = () => this.setState({ giftsOpen:false });\n  openSongForm = () => this.setState({ showSongForm:true });\n  closeSongForm = () => this.setState({ showSongForm:false });\n  copyAlias = () => {\n    try{ navigator.clipboard && navigator.clipboard.writeText(this.state.giftAlias || ''); }catch(_){}\n    this.setState({ aliasCopied:true });\n    clearTimeout(this._aliasT); this._aliasT=setTimeout(()=>this.setState({ aliasCopied:false }), 2000);\n  };\n  // ---- FAQ ----\n  toggleFaq = (i) => () => this.setState(s=>({ faqOpen: s.faqOpen===i ? null : i }));\n\n  // ---- RSVP ----\n  onTitular = (e) => { this.setState({ titular: e.currentTarget.value }); };\n  setAsiste = (e) => { this.setState({ asiste: e.currentTarget.dataset.v==='1' }); };\n  changeNum = (e) => {\n    const d = +e.currentTarget.dataset.d;\n    this.setState(s=>{ const cap=(s.maxSeats>0)?Math.max(0,s.maxSeats-1):8; const n=Math.min(cap,Math.max(0,s.numAcomp+d)); const names=s.names.slice(0,n); while(names.length<n) names.push(''); return { numAcomp:n, names }; });\n  };\n  onName = (e) => { const i=+e.currentTarget.dataset.i, v=e.currentTarget.value; this.setState(s=>{ const names=s.names.slice(); names[i]=v; return { names }; }); };\n  toggleSpecial = (e) => this.setState({ special:e.currentTarget.checked });\n  toggleMenuOpt = (e) => { const o=e.currentTarget.dataset.opt; this.setState(s=>{ const sel=s.menuSel.includes(o)?s.menuSel.filter(x=>x!==o):s.menuSel.concat(o); return { menuSel:sel }; }); };\n  onObs = (e) => this.setState({ obs:e.currentTarget.value });\n  submitRsvp = (e) => {\n    e.preventDefault();\n    const s=this.state;\n    // Payload listo para integrar con n8n (WF-02 POST /rsvp) + Google Sheets\n    const payload = { slug:(this.slug||'eri-pato'), guestId:(this.guestId||'001'), titular:s.titular.trim(), asiste:s.asiste===true, cantidad:(s.asiste? s.numAcomp+1:0), nombres:s.names, menu:s.menuSel.join(', '), comentarios:s.obs };\n    this.setState({ submitted:true });   // UI optimista\n    try{ fetch(this.API_BASE+'/rsvp', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) }).catch(()=>{}); }catch(_){}\n  };\n\n  renderVals(){\n    const now=this.state.now; let diff=Math.max(0,this.target-now);\n    const D=864e5,H=36e5,M=6e4;\n    const dias=Math.floor(diff/D); diff-=dias*D;\n    const horas=Math.floor(diff/H); diff-=horas*H;\n    const min=Math.floor(diff/M); diff-=min*M;\n    const seg=Math.floor(diff/1000);\n    const p2=n=>String(n).padStart(2,'0');\n    const s=this.state;\n    // ---- coverflow ----\n    const m=this._metrics(); const N=this.photos8.length; const pos=s.pos; const imgs=s.galleryImages||[];\n    // ---- Contenido dinámico desde B2 (con fallback a los valores actuales) ----\n    const C = this.cfg || {};\n    const story = C.story || {};\n    const storyTitle = story.title || 'Nuestra Historia';\n    const storyText  = story.text  || 'Nos conocimos sin buscarlo, compartimos risas, cafés y sueños. Aprendimos a elegirnos cada día y a construir nuestro lugar en el mundo. Hoy, queremos que seas parte de este nuevo comienzo que celebramos con el corazón.';\n    const dcfg = C.dressCode || {};\n    const dressLabel = dcfg.label || 'Formal Elegante';\n    const dressDesc  = dcfg.description || 'El blanco queda reservado para la novia.';\n    const gps = C.guestPhotoSharing || {};\n    const driveUrl = gps.driveFolderUrl || 'https://drive.google.com/drive/folders/1-HgthXyG9rPcY68kaHQlDujoNfczr_c
